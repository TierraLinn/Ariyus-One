# This file was auto-generated by Antigravity for Ariyus-One continuous deployment.
name: Deploy to Firebase Hosting on Merge

on:
  push:
    branches:
      - main
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Execute Automated Unit Tests
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Compile Optimized Production Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARIYUS_ONE }}'
          channelId: live
          projectId: ariyus-one
